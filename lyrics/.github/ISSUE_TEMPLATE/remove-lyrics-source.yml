name: Request Lyrics Source Removal
description: Propose removing an existing lyrics provider from ArchiveTune's lyrics module
title: "[Remove Source] "
labels: ["Remove Request"]
body:
  - type: dropdown
    id: source-name
    attributes:
      label: Lyrics Source to Remove
      options:
        - kugou (KuGou)
        - lrclib (LRC Lib)
        - simpmusic (SimpMusic)
        - paxsenix (Paxsenix / Apple Music / NetEase / Spotify / Musixmatch / YouTube)
        - betterlyrics (BetterLyrics)
        - unison (Unison)
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Reason for Removal
      description: Why should this source be removed?
      placeholder: e.g. API is no longer available, source is unreliable, replaced by a better provider, legal concerns, etc.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Provide links, error logs, or documentation supporting the removal
      placeholder: |
        - Link to deprecation notice
        - Error logs showing the API returning 404/403
        - Alternative source that covers this provider's use case
    validations:
      required: true

  - type: checkboxes
    id: impact
    attributes:
      label: Impact Assessment
      options:
        - label: I have verified this source has a replacement alternative in the module
        - label: Removing this source would not break existing user functionality

  - type: textarea
    id: migration
    attributes:
      label: Migration Path
      description: If applicable, suggest how users who relied on this source should migrate
      placeholder: e.g. Users should switch to Paxsenix Apple Music provider as it covers the same tracks
