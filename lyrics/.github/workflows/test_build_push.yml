name: Test Build

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**.md"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: "temurin"

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: "8.10"
          cache-read-only: true
          cache-cleanup: on-success

      - name: Build Debug and Run Tests
        run: gradle --console=plain build test --warning-mode summary
